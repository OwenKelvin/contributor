extend type Mutation {
  register(registerInput: RegisterInput!): AuthResponse!
  login(loginInput: LoginInput!): AuthResponse!
  googleLogin(idToken: String!): AuthResponse!
  requestPasswordReset(email: String!): Boolean!
  resetPassword(resetPasswordInput: ResetPasswordInput!): AuthResponse!
  requestMagicLink(email: String!): Boolean!
  magicLinkLogin(magicLinkLoginInput: MagicLinkLoginInput!): MagicLinkLoginResponse!
  sendContactMessage(input: ContactMessageInput!): Boolean!
}

input ContactMessageInput {
  name: String!
  email: String!
  subject: String!
  message: String!
}

input ResetPasswordInput {
  token: String!
  newPassword: String!
}

input MagicLinkLoginInput {
  token: String!
  acceptTerms: Boolean
}

type MagicLinkLoginResponse {
  requiresTermsAcceptance: Boolean
  user: User
  accessToken: String
}
