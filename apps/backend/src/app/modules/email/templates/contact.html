<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Contact Form Submission</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header {
      background-color: #6C0B0B;
      padding: 30px;
      text-align: center;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 22px;
      font-weight: 600;
    }
    .content {
      padding: 30px;
    }
    .field {
      margin-bottom: 20px;
    }
    .field-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7c8084;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .field-value {
      font-size: 16px;
      color: #222426;
      line-height: 1.5;
    }
    .message-box {
      background-color: #f8f8f8;
      border-radius: 6px;
      padding: 16px;
      margin-top: 8px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .footer {
      background-color: #faf7f5;
      padding: 20px 30px;
      text-align: center;
      font-size: 13px;
      color: #7c8084;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>New Contact Form Submission</h1>
    </div>
    <div class="content">
      <div class="field">
        <div class="field-label">From</div>
        <div class="field-value">{{name}} &lt;{{fromEmail}}&gt;</div>
      </div>
      
      <div class="field">
        <div class="field-label">Subject</div>
        <div class="field-value">{{subject}}</div>
      </div>
      
      <div class="field">
        <div class="field-label">Message</div>
        <div class="message-box">{{message}}</div>
      </div>
    </div>
    
    <div class="footer">
      <p>This email was sent from the NyotsCo contact form. &copy; {{year}} NyotsCo.</p>
    </div>
  </div>
</body>
</html>
