name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_app:
        description: 'App to deploy'
        required: true
        type: choice
        options:
          - backend
          - admin
          - client
          - all

permissions:
  actions: read
  contents: read
  packages: write

env:
  PNPM_VERSION: '9.8.0'
  NODE_VERSION: '20'

jobs:
  # ─── Detect which apps changed ────────────────────────────────────────────────
  affected:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      backend:    ${{ steps.filter.outputs.backend }}
      admin:      ${{ steps.filter.outputs.admin }}
      client:     ${{ steps.filter.outputs.client }}
      repo_lower: ${{ steps.repo_name.outputs.repo_lower }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Detect affected projects
        id: filter
        run: |
          AFFECTED=$(pnpm exec nx show projects --affected --base=$NX_BASE --head=$NX_HEAD)
          echo "Affected projects: $AFFECTED"
          echo "backend=$(echo "$AFFECTED" | grep -w 'backend' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "admin=$(  echo "$AFFECTED" | grep -w 'admin'   | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "client=$( echo "$AFFECTED" | grep -w 'client'  | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Set lowercase repository name
        id: repo_name
        run: |
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  # ─── Resolve repo name for manual deploys ─────────────────────────────────────
  # Needed because the `affected` job is skipped on workflow_dispatch
  repo-meta:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      repo_lower: ${{ steps.repo_name.outputs.repo_lower }}
    steps:
      - name: Set lowercase repository name
        id: repo_name
        run: |
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  # ─── CI build jobs (affected only) ────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.backend == '1'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx docker:build backend --no-cloud

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE=ghcr.io/${{ needs.affected.outputs.repo_lower }}/apps-backend
          docker tag apps-backend $IMAGE:${{ github.sha }}
          docker tag apps-backend $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  build-admin:
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.admin == '1'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx docker:build admin --no-cloud
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE=ghcr.io/${{ needs.affected.outputs.repo_lower }}/apps-admin
          docker tag apps-admin $IMAGE:${{ github.sha }}
          docker tag apps-admin $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  build-client:
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.client == '1'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx docker:build client --no-cloud
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE=ghcr.io/${{ needs.affected.outputs.repo_lower }}/apps-client
          docker tag apps-client $IMAGE:${{ github.sha }}
          docker tag apps-client $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ─── Manual deploy jobs (workflow_dispatch only) ───────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: repo-meta
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.deploy_app == 'backend' || github.event.inputs.deploy_app == 'all')
    timeout-minutes: 10
    environment: production
    steps:
      - name: Deploy backend to Contabo
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.CONTABO_SERVER }}
          username: ${{ secrets.CONTABO_USERNAME }}
          password: ${{ secrets.CONTABO_PASSWORD }}
          script: |
            IMAGE=ghcr.io/${{ needs.repo-meta.outputs.repo_lower }}/apps-backend
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:latest
            docker stop apps-backend || true
            docker rm   apps-backend || true
            docker run -d --name apps-backend --restart unless-stopped -p 3000:3000 $IMAGE:latest
            docker image prune -f

  deploy-admin:
    runs-on: ubuntu-latest
    needs: repo-meta
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.deploy_app == 'admin' || github.event.inputs.deploy_app == 'all')
    timeout-minutes: 10
    environment: production
    steps:
      - name: Deploy admin to Contabo
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.CONTABO_SERVER }}
          username: ${{ secrets.CONTABO_USERNAME }}
          password: ${{ secrets.CONTABO_PASSWORD }}
          script: |
            IMAGE=ghcr.io/${{ needs.repo-meta.outputs.repo_lower }}/apps-admin
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:latest
            docker stop apps-admin || true
            docker rm   apps-admin || true
            docker run -d --name apps-admin --restart unless-stopped -p 51001:3000 $IMAGE:latest
            docker image prune -f

  deploy-client:
    runs-on: ubuntu-latest
    needs: repo-meta
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.deploy_app == 'client' || github.event.inputs.deploy_app == 'all')
    timeout-minutes: 10
    environment: production
    steps:
      - name: Deploy client to Contabo
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.CONTABO_SERVER }}
          username: ${{ secrets.CONTABO_USERNAME }}
          password: ${{ secrets.CONTABO_PASSWORD }}
          script: |
            IMAGE=ghcr.io/${{ needs.repo-meta.outputs.repo_lower }}/apps-client
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:latest
            docker stop apps-client || true
            docker rm   apps-client || true
            docker run -d --name apps-client --restart unless-stopped -p 51000:3000 $IMAGE:latest
            docker image prune -f
