name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  packages: write

env:
  PNPM_VERSION: '9.8.0'
  NODE_VERSION: '20'

jobs:
  # ─── Detect which apps changed ────────────────────────────────────────────────
  affected:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin:   ${{ steps.filter.outputs.admin }}
      client:  ${{ steps.filter.outputs.client }}
      repo_lower: ${{ steps.repo_name.outputs.repo_lower }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Sets NX_BASE and NX_HEAD SHAs so `nx affected` compares the right commits
      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Detect affected projects
        id: filter
        run: |
          AFFECTED=$(pnpm exec nx show projects --affected --base=$NX_BASE --head=$NX_HEAD)
          echo "Affected projects: $AFFECTED"
          echo "backend=$( echo "$AFFECTED" | grep -w 'backend' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "admin=$(   echo "$AFFECTED" | grep -w 'admin'   | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "client=$(  echo "$AFFECTED" | grep -w 'client'  | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Set lowercase repository name
        id: repo_name
        run: |
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  # ─── Build jobs (only run if the app is affected) ─────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.backend == '1'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx docker:build backend --no-cloud

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE=ghcr.io/${{ needs.affected.outputs.repo_lower }}/apps-backend
          docker tag apps-backend $IMAGE:${{ github.sha }}
          docker tag apps-backend $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  build-admin:
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.admin == '1'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx docker:build admin --no-cloud

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE=ghcr.io/${{ needs.affected.outputs.repo_lower }}/apps-admin
          docker tag apps-admin $IMAGE:${{ github.sha }}
          docker tag apps-admin $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  build-client:
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.client == '1'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx docker:build client --no-cloud

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE=ghcr.io/${{ needs.affected.outputs.repo_lower }}/apps-client
          docker tag apps-client $IMAGE:${{ github.sha }}
          docker tag apps-client $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
